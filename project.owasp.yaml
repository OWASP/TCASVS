name: OWASP Thick Client Application Security Verification Standard
pitch: The OWASP Thick Client Application Security Verification Standard (TCASVS) provides a comprehensive set of security requirements for designing, building, and testing thick client applications. It fills the gap between the OWASP ASVS for web applications and the MASVS for mobile applications, providing purpose-built requirements for desktop and native applications that execute outside a browser sandbox.
